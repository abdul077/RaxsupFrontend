<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ isEditMode ? 'Edit Owner Operator' : 'Create Owner Operator' }}</h2>
    <button class="btn btn-secondary" (click)="cancel()">
      <i class="fas fa-times me-2"></i>
      Cancel
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <form [formGroup]="ownerOperatorForm" (ngSubmit)="onSubmit()" *ngIf="!loading">
    <div class="row">
      <div class="col-md-8">
        <div class="card mb-4">
          <div class="card-header">
            <h5 class="mb-0">Company Information</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Company Name *</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="companyName"
                [class.is-invalid]="ownerOperatorForm.get('companyName')?.invalid && ownerOperatorForm.get('companyName')?.touched">
              <div class="invalid-feedback" *ngIf="ownerOperatorForm.get('companyName')?.invalid && ownerOperatorForm.get('companyName')?.touched">
                Company name is required
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contact Name</label>
              <input type="text" class="form-control" formControlName="contactName">
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input 
                  type="email" 
                  class="form-control" 
                  formControlName="email"
                  [class.is-invalid]="ownerOperatorForm.get('email')?.invalid && ownerOperatorForm.get('email')?.touched">
                <div class="invalid-feedback" *ngIf="ownerOperatorForm.get('email')?.invalid && ownerOperatorForm.get('email')?.touched">
                  Please enter a valid email address
                </div>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" formControlName="phone">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" formControlName="address">
            </div>

            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">City</label>
                <input type="text" class="form-control" formControlName="city">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">State</label>
                <input type="text" class="form-control" formControlName="state">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Zip Code</label>
                <input type="text" class="form-control" formControlName="zipCode">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Tax ID / EIN</label>
              <input type="text" class="form-control" formControlName="taxId">
            </div>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-header">
            <h5 class="mb-0">Contract & Rates</h5>
          </div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Default Rate</label>
                <input type="number" step="0.01" class="form-control" formControlName="defaultRate">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Rate Type</label>
                <select class="form-select" formControlName="rateType">
                  <option value="">Select rate type</option>
                  <option *ngFor="let type of rateTypeOptions" [value]="type">{{ type }}</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Contract Start Date</label>
                <input type="date" class="form-control" formControlName="contractStartDate">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Contract End Date</label>
                <input type="date" class="form-control" formControlName="contractEndDate">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contract Terms</label>
              <textarea 
                class="form-control" 
                rows="4" 
                formControlName="contractTerms"
                placeholder="Enter contract terms and conditions..."></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card mb-4">
          <div class="card-header">
            <h5 class="mb-0">Status</h5>
          </div>
          <div class="card-body">
            <div class="form-check form-switch mb-3">
              <input 
                class="form-check-input" 
                type="checkbox" 
                id="isActive"
                formControlName="isActive">
              <label class="form-check-label" for="isActive">
                Active
              </label>
            </div>
          </div>
        </div>

        <div class="d-grid gap-2">
          <button 
            type="submit" 
            class="btn btn-primary"
            [disabled]="ownerOperatorForm.invalid || submitting">
            <i class="fas fa-save me-2"></i>
            {{ submitting ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
          </button>
          <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
