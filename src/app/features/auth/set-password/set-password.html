<div class="login-container">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo-container">
        <img src="/assets/logo.png" alt="RaxsUp Logo" class="login-logo mb-3">
        <span class="beta-badge" *ngIf="isBeta">BETA</span>
      </div>
      <h2 class="mb-1">Set Your Password</h2>
      <p class="text-muted">Create a secure password for your account</p>
    </div>

    <form [formGroup]="setPasswordForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="password" class="form-label">New Password *</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="fas fa-lock"></i>
          </span>
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            class="form-control" 
            formControlName="password"
            placeholder="Enter your password (min 6 characters)"
            [class.is-invalid]="setPasswordForm.get('password')?.invalid && setPasswordForm.get('password')?.touched" />
          <button type="button" class="input-group-text password-toggle-btn" (click)="togglePasswordVisibility()" tabindex="-1">
            <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
        <div class="invalid-feedback d-block"
          *ngIf="setPasswordForm.get('password')?.invalid && setPasswordForm.get('password')?.touched">
          <span *ngIf="setPasswordForm.get('password')?.errors?.['required']">Password is required</span>
          <span *ngIf="setPasswordForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password *</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="fas fa-lock"></i>
          </span>
          <input 
            [type]="showConfirmPassword ? 'text' : 'password'" 
            id="confirmPassword" 
            class="form-control" 
            formControlName="confirmPassword"
            placeholder="Confirm your password"
            [class.is-invalid]="setPasswordForm.get('confirmPassword')?.invalid && setPasswordForm.get('confirmPassword')?.touched" />
          <button type="button" class="input-group-text password-toggle-btn" (click)="toggleConfirmPasswordVisibility()" tabindex="-1">
            <i class="fas" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
        <div class="invalid-feedback d-block"
          *ngIf="setPasswordForm.get('confirmPassword')?.hasError('passwordMismatch') && setPasswordForm.get('confirmPassword')?.touched">
          Passwords do not match
        </div>
        <div class="invalid-feedback d-block"
          *ngIf="setPasswordForm.get('confirmPassword')?.hasError('required') && setPasswordForm.get('confirmPassword')?.touched">
          Please confirm your password
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle me-2"></i>
        {{ errorMessage }}
      </div>

      <div class="alert alert-success" *ngIf="successMessage">
        <i class="fas fa-check-circle me-2"></i>
        {{ successMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="setPasswordForm.invalid || loading || !token">
        <i class="fas fa-key me-2" *ngIf="!loading"></i>
        <span *ngIf="loading">
          <i class="fas fa-spinner fa-spin me-2"></i>
          Setting Password...
        </span>
        <span *ngIf="!loading">Set Password</span>
      </button>

      <div class="text-center mt-3">
        <a [routerLink]="['/auth/login']" class="text-decoration-none">
          <i class="fas fa-arrow-left me-2"></i>
          Back to Login
        </a>
      </div>
    </form>

    <div class="text-center mt-4">
      <small class="text-muted">© 2024 RaxsUp{{ isBeta ? ' Beta' : '' }}. All rights reserved.</small>
    </div>
  </div>
</div>
