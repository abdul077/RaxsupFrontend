<div class="accessorial-type-list-container">
  <!-- Page Header - dashboard style -->
  <div class="tms-dashboard-header mb-4">
    <div class="tms-header-left">
      <div class="tms-header-icon">
        <i class="fas fa-tags"></i>
      </div>
      <div>
        <h1 class="tms-title">Accessorial Types</h1>
        <p class="tms-subtitle mb-0">Manage accessorial types for load pricing</p>
      </div>
    </div>
    <div class="tms-header-actions">
      <button class="btn btn-tms-primary" (click)="openCreateModal()">
        <i class="fas fa-plus me-2"></i>Add New Type
      </button>
    </div>
  </div>

  <!-- Actions cell template (three-dots dropdown) -->
  <ng-template #actionsCell let-type>
    <div class="dropdown" (click)="$event.stopPropagation()">
      <button type="button" class="tms-actions-btn" data-bs-toggle="dropdown" aria-expanded="false" title="Actions">
        <i class="fas fa-ellipsis-h tms-actions-dots"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end tms-actions-dropdown">
        <li><a class="dropdown-item" href="javascript:void(0)" (click)="openEditModal(type)">Edit</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="javascript:void(0)" (click)="deleteAccessorialType(type)">Delete</a></li>
      </ul>
    </div>
  </ng-template>

  <!-- Accessorial Types Card -->
  <div class="accessorial-types-card">
    <div class="accessorial-types-card-header">
      <h5><i class="fas fa-list me-2"></i>Accessorial Types</h5>
    </div>
    <div class="accessorial-types-card-body p-0">
      <app-data-table
        [config]="tableConfig"
        [dataSource]="dataSource"
        [emptyMessage]="'No accessorial types found. Create a new one to get started.'"
        [refreshTrigger]="tableRefreshTrigger">
      </app-data-table>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal accessorial-modal" [class.show]="showCreateModal" *ngIf="showCreateModal">
  <div class="modal-backdrop" (click)="closeCreateModal()"></div>
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create Accessorial Type</h5>
        <button type="button" class="btn-close" (click)="closeCreateModal()"></button>
      </div>
      <div class="modal-body">
        <form (ngSubmit)="createAccessorialType()">
          <div class="form-group">
            <label>Name *</label>
            <input 
              type="text" 
              class="form-control" 
              [(ngModel)]="newAccessorialType.name" 
              name="name"
              required
              placeholder="e.g., Detention, Layover, Fuel Surcharge">
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea 
              class="form-control" 
              rows="3"
              [(ngModel)]="newAccessorialType.description" 
              name="description"
              placeholder="Optional description for this accessorial type"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="closeCreateModal()">Cancel</button>
            <button type="submit" class="btn btn-primary" [disabled]="!isCreateFormValid()">Create</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal accessorial-modal" [class.show]="showEditModal" *ngIf="showEditModal">
  <div class="modal-backdrop" (click)="closeEditModal()"></div>
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Accessorial Type</h5>
        <button type="button" class="btn-close" (click)="closeEditModal()"></button>
      </div>
      <div class="modal-body">
        <form (ngSubmit)="updateAccessorialType()">
          <div class="form-group">
            <label>Name *</label>
            <input 
              type="text" 
              class="form-control" 
              [(ngModel)]="editAccessorialType.name" 
              name="editName"
              required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea 
              class="form-control" 
              rows="3"
              [(ngModel)]="editAccessorialType.description" 
              name="editDescription"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="closeEditModal()">Cancel</button>
            <button type="submit" class="btn btn-primary" [disabled]="!isEditFormValid()">Update</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
