@if (loadingService.loading$ | async) {
  <div class="global-loader-overlay" role="status" aria-live="polite" aria-busy="true">
    <div class="tms-loader-card">
      <div class="tms-loader-dots" aria-hidden="true">
        <span class="tms-loader-dot"></span>
        <span class="tms-loader-dot"></span>
        <span class="tms-loader-dot"></span>
      </div>
      <div class="tms-loader-track" aria-hidden="true">
        <div class="tms-loader-bar"></div>
      </div>
      <p class="tms-loader-caption">Loading…</p>
    </div>
  </div>
}
