<div class="row g-4">
  <div class="col-md-3 col-sm-6">
    <div class="card text-center quick-stat-card">
      <div class="card-body">
        <i class="fas fa-dollar-sign fa-2x text-primary mb-2"></i>
        <h4 class="mb-1">{{ formatCurrency(totalEarnings) }}</h4>
        <small class="text-muted">Total Earnings</small>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="card text-center quick-stat-card">
      <div class="card-body">
        <i class="fas fa-calendar-check fa-2x text-success mb-2"></i>
        <h4 class="mb-1">{{ formatCurrency(currentMonthEarnings) }}</h4>
        <small class="text-muted">This Month</small>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="card text-center quick-stat-card">
      <div class="card-body">
        <i class="fas fa-boxes fa-2x text-info mb-2"></i>
        <h4 class="mb-1">{{ completedLoads }}</h4>
        <small class="text-muted">Completed Loads</small>
      </div>
    </div>
  </div>
  <div class="col-md-3 col-sm-6">
    <div class="card text-center quick-stat-card">
      <div class="card-body">
        <i class="fas fa-users fa-2x text-warning mb-2"></i>
        <h4 class="mb-1">{{ referralCount }}</h4>
        <small class="text-muted">Referrals</small>
        @if (referralEarnings > 0) {
          <div class="mt-1">
            <small class="text-success">{{ formatCurrency(referralEarnings) }} earned</small>
          </div>
        }
      </div>
    </div>
  </div>
</div>
