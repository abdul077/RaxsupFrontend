<div *ngIf="show" class="confirmation-modal-overlay" (click)="onOverlayClick()">
  <div class="confirmation-modal-content" (click)="$event.stopPropagation()">
    <div class="confirmation-modal-header" [style.background]="'linear-gradient(135deg, ' + iconColor + ' 0%, ' + getDarkerColor(iconColor) + ' 100%)'">
      <div class="modal-icon-wrapper">
        <i [class]="iconClass"></i>
      </div>
      <h2>{{ data?.title || 'Confirm Action' }}</h2>
      <button class="btn-close" (click)="onClose()" [disabled]="loading">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="confirmation-modal-body">
      <p class="confirmation-message" *ngIf="data?.message">
        <span [innerHTML]="data?.message"></span>
      </p>
      
      <div class="details-card" *ngIf="data?.showDetails && data?.details && (data?.details?.length ?? 0) > 0">
        <div class="detail-row" *ngFor="let detail of data?.details">
          <span class="detail-label">
            <i [class]="detail.icon || 'fas fa-circle'"></i>
            {{ detail.label }}:
          </span>
          <span class="detail-value" [innerHTML]="detail.value"></span>
        </div>
      </div>

      <div class="modal-notice" *ngIf="data?.notice">
        <i class="fas fa-info-circle"></i>
        <span>{{ data?.notice }}</span>
      </div>

      <div class="modal-input-section" *ngIf="data?.showInput">
        <label class="form-label">{{ data?.inputLabel || 'Reason' }}</label>
        <textarea 
          class="form-control" 
          rows="3"
          [placeholder]="data?.inputPlaceholder || 'Enter reason...'"
          [(ngModel)]="inputValue"
          [disabled]="loading"></textarea>
      </div>

      <div class="alert alert-danger mt-3 mb-0" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle me-2"></i>
        {{ errorMessage }}
      </div>
    </div>
    <div class="confirmation-modal-footer">
      <button 
        class="btn btn-secondary" 
        (click)="onCancel()" 
        [disabled]="loading">
        {{ data?.cancelText || 'Cancel' }}
      </button>
      <button 
        [class]="'btn ' + confirmButtonClass" 
        (click)="onConfirm()" 
        [disabled]="loading">
        <i class="fas fa-check me-1" *ngIf="!loading"></i>
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status">
          <span class="visually-hidden">Loading...</span>
        </span>
        {{ loading ? 'Processing...' : (data?.confirmText || 'Confirm') }}
      </button>
    </div>
  </div>
</div>
